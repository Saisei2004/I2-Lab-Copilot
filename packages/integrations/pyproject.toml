[project]
name = "i2-integrations"
version = "0.1.0"
description = "外部連携（GitHub 報告書 / STT など）"
requires-python = ">=3.13"
dependencies = [
    "i2-core",
    "httpx>=0.27",
    "google-cloud-speech>=2.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/i2_integrations"]

[tool.uv.sources]
i2-core = { workspace = true }
