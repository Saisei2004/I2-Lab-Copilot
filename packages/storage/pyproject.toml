[project]
name = "i2-storage"
version = "0.1.0"
description = "Firestore / GCS データアクセス層"
requires-python = ">=3.13"
dependencies = [
    "i2-core",
    "google-cloud-firestore>=2.16",
    "google-cloud-storage>=2.17",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/i2_storage"]

[tool.uv.sources]
i2-core = { workspace = true }
