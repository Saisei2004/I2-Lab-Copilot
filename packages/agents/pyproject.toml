[project]
name = "i2-agents"
version = "0.1.0"
description = "ADK エージェント定義（root / meeting / feedback / report）"
requires-python = ">=3.13"
dependencies = [
    "i2-core",
    "i2-storage",
    "i2-integrations",
    "google-adk>=0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/i2_agents"]

[tool.uv.sources]
i2-core = { workspace = true }
i2-storage = { workspace = true }
i2-integrations = { workspace = true }
