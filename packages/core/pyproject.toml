[project]
name = "i2-core"
version = "0.1.0"
description = "共通設定・ロギング・GCP クライアント"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "google-cloud-secret-manager>=2.20",
    "structlog>=24.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/i2_core"]
